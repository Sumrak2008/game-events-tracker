<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Game Events Tracker hero">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.5" stop-color="#1b1b4b"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <radialGradient id="hero-g1" cx="0.18" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hero-g2" cx="0.85" cy="0.3" r="0.5">
      <stop offset="0" stop-color="#f472b6" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hero-g3" cx="0.6" cy="0.9" r="0.6">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#hero-bg)"/>
  <rect width="1200" height="500" fill="url(#hero-g1)"/>
  <rect width="1200" height="500" fill="url(#hero-g2)"/>
  <rect width="1200" height="500" fill="url(#hero-g3)"/>
  <!-- orbit arcs -->
  <g fill="none" stroke="#a5b4fc" stroke-width="1.5" opacity="0.25">
    <ellipse cx="600" cy="250" rx="520" ry="160"/>
    <ellipse cx="600" cy="250" rx="380" ry="110"/>
    <ellipse cx="600" cy="250" rx="240" ry="70"/>
  </g>
  <!-- stars -->
  <g fill="#e7eaf4">
    <circle cx="120" cy="90" r="2"/><circle cx="300" cy="150" r="1.5"/><circle cx="500" cy="70" r="2.2"/>
    <circle cx="760" cy="120" r="1.6"/><circle cx="940" cy="80" r="2"/><circle cx="1080" cy="160" r="1.8"/>
    <circle cx="220" cy="360" r="1.6"/><circle cx="430" cy="420" r="2"/><circle cx="700" cy="400" r="1.5"/>
    <circle cx="900" cy="380" r="1.8"/><circle cx="1040" cy="420" r="1.6"/><circle cx="60" cy="240" r="1.5"/>
  </g>
  <!-- planets -->
  <circle cx="360" cy="320" r="10" fill="#2dd4bf" opacity="0.9"/>
  <circle cx="820" cy="180" r="7" fill="#f472b6" opacity="0.9"/>
  <circle cx="980" cy="300" r="13" fill="#818cf8" opacity="0.9"/>
</svg>
