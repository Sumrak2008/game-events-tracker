<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NIKKE — futuristic sci-fi">
  <defs>
    <linearGradient id="nk-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4c0519"/>
      <stop offset="0.5" stop-color="#be123c"/>
      <stop offset="1" stop-color="#190610"/>
    </linearGradient>
    <linearGradient id="nk-horizon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#fb7185" stop-opacity="0"/>
    </linearGradient>
    <filter id="nk-glow"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#nk-bg)"/>
  <!-- horizon glow -->
  <rect x="0" y="250" width="800" height="120" fill="url(#nk-horizon)" opacity="0.5"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#fda4af" stroke-width="2" opacity="0.6"/>
  <!-- perspective grid -->
  <g stroke="#fb7185" stroke-width="1" opacity="0.3">
    <line x1="400" y1="300" x2="120" y2="450"/><line x1="400" y1="300" x2="280" y2="450"/>
    <line x1="400" y1="300" x2="520" y2="450"/><line x1="400" y1="300" x2="680" y2="450"/>
    <line x1="0" y1="360" x2="800" y2="360"/><line x1="0" y1="410" x2="800" y2="410"/>
  </g>
  <!-- ruined skyline -->
  <g fill="#1a0710">
    <rect x="60" y="200" width="50" height="100"/><rect x="130" y="160" width="40" height="140"/>
    <rect x="600" y="180" width="56" height="120"/><rect x="676" y="150" width="44" height="150"/>
  </g>
  <!-- sci-fi sun -->
  <circle cx="400" cy="250" r="70" fill="none" stroke="#fecdd3" stroke-width="3" opacity="0.7" filter="url(#nk-glow)"/>
  <path d="M330 250 a70 70 0 0 1 140 0" fill="#fda4af" opacity="0.18"/>
  <!-- targeting reticle -->
  <g stroke="#fecdd3" stroke-width="2" fill="none" opacity="0.8">
    <circle cx="540" cy="140" r="22"/>
    <line x1="540" y1="110" x2="540" y2="170"/><line x1="510" y1="140" x2="570" y2="140"/>
  </g>
  <rect width="800" height="450" fill="#120409" opacity="0.18"/>
</svg>
