<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Genshin Impact — fantasy sky">
  <defs>
    <linearGradient id="gi-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7ff3e3"/>
      <stop offset="0.45" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <radialGradient id="gi-sun" cx="0.72" cy="0.28" r="0.5">
      <stop offset="0" stop-color="#fffbe6" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fffbe6" stop-opacity="0"/>
    </radialGradient>
    <filter id="gi-blur"><feGaussianBlur stdDeviation="9"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#gi-sky)"/>
  <circle cx="576" cy="126" r="150" fill="url(#gi-sun)"/>
  <circle cx="576" cy="126" r="46" fill="#fffef2" opacity="0.9"/>
  <!-- distant peaks -->
  <path d="M0 330 L150 250 L280 320 L420 240 L560 320 L700 260 L800 320 L800 450 L0 450 Z" fill="#0b6b78" opacity="0.55"/>
  <path d="M0 380 L120 320 L260 380 L400 320 L540 380 L680 330 L800 380 L800 450 L0 450 Z" fill="#06505c" opacity="0.8"/>
  <!-- floating islands -->
  <g opacity="0.9">
    <ellipse cx="200" cy="210" rx="70" ry="20" fill="#0b6b78"/>
    <path d="M150 210 L200 270 L250 210 Z" fill="#083f49"/>
    <ellipse cx="200" cy="206" rx="70" ry="16" fill="#1fae9c"/>
  </g>
  <!-- aura / character presence -->
  <g filter="url(#gi-blur)" opacity="0.7">
    <path d="M330 450 C330 300 470 300 470 450 Z" fill="#fffbe6" opacity="0.5"/>
  </g>
  <!-- sparkles -->
  <g fill="#fffef2">
    <circle cx="120" cy="120" r="3"/><circle cx="250" cy="90" r="2"/><circle cx="690" cy="200" r="2.5"/>
    <circle cx="470" cy="150" r="2"/><circle cx="350" cy="110" r="2.2"/><circle cx="620" cy="320" r="2"/>
    <circle cx="160" cy="280" r="2"/><circle cx="720" cy="120" r="2.4"/>
  </g>
  <rect width="800" height="450" fill="#06303a" opacity="0.12"/>
</svg>
