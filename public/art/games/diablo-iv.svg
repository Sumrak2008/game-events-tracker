<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diablo IV — dark fantasy">
  <defs>
    <linearGradient id="d4-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b0a0a"/>
      <stop offset="0.5" stop-color="#7f1d1d"/>
      <stop offset="1" stop-color="#0a0606"/>
    </linearGradient>
    <radialGradient id="d4-portal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fca5a5"/>
      <stop offset="0.5" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#7f1d1d" stop-opacity="0"/>
    </radialGradient>
    <filter id="d4-glow"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#d4-bg)"/>
  <!-- portal glow -->
  <circle cx="400" cy="200" r="150" fill="url(#d4-portal)" opacity="0.7" filter="url(#d4-glow)"/>
  <!-- jagged peaks -->
  <path d="M0 360 L90 250 L150 320 L240 220 L330 330 L420 240 L520 330 L620 250 L720 330 L800 280 L800 450 L0 450 Z" fill="#1a0808"/>
  <path d="M0 400 L120 330 L260 400 L400 340 L540 400 L680 350 L800 400 L800 450 L0 450 Z" fill="#0b0404"/>
  <!-- rune sigil -->
  <g stroke="#fca5a5" stroke-width="3" fill="none" opacity="0.85" filter="url(#d4-glow)">
    <polygon points="400,120 470,200 400,280 330,200"/>
    <line x1="400" y1="120" x2="400" y2="280"/>
    <line x1="330" y1="200" x2="470" y2="200"/>
  </g>
  <!-- embers -->
  <g fill="#fca5a5">
    <circle cx="250" cy="160" r="2.5" opacity="0.9"/><circle cx="540" cy="140" r="2" opacity="0.8"/>
    <circle cx="320" cy="100" r="1.8" opacity="0.7"/><circle cx="500" cy="240" r="2.2" opacity="0.8"/>
    <circle cx="180" cy="120" r="1.6" opacity="0.6"/><circle cx="610" cy="200" r="2" opacity="0.7"/>
  </g>
  <rect width="800" height="450" fill="#070303" opacity="0.2"/>
</svg>
