<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Honkai Star Rail — cosmic">
  <defs>
    <linearGradient id="hsr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="0.5" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#0b1030"/>
    </linearGradient>
    <radialGradient id="hsr-planet" cx="0.3" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </radialGradient>
    <filter id="hsr-blur"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#hsr-bg)"/>
  <!-- stars -->
  <g fill="#ede9fe">
    <circle cx="80" cy="70" r="1.6"/><circle cx="160" cy="130" r="1.2"/><circle cx="240" cy="60" r="2"/>
    <circle cx="360" cy="100" r="1.4"/><circle cx="520" cy="70" r="1.8"/><circle cx="640" cy="140" r="1.3"/>
    <circle cx="720" cy="80" r="2"/><circle cx="700" cy="300" r="1.5"/><circle cx="120" cy="320" r="1.4"/>
    <circle cx="300" cy="360" r="1.6"/><circle cx="470" cy="330" r="1.3"/><circle cx="60" cy="200" r="1.2"/>
  </g>
  <!-- planet + ring -->
  <g transform="translate(600 300)">
    <ellipse cx="0" cy="0" rx="150" ry="42" fill="none" stroke="#a78bfa" stroke-width="6" opacity="0.55"/>
    <circle cx="0" cy="0" r="78" fill="url(#hsr-planet)"/>
    <ellipse cx="0" cy="0" rx="150" ry="42" fill="none" stroke="#ddd6fe" stroke-width="2" opacity="0.4"/>
  </g>
  <!-- comet / rail -->
  <g filter="url(#hsr-blur)" opacity="0.8">
    <path d="M-20 380 Q300 250 560 150" stroke="#67e8f9" stroke-width="5" fill="none"/>
  </g>
  <circle cx="560" cy="150" r="6" fill="#ecfeff"/>
  <!-- constellation -->
  <g stroke="#c4b5fd" stroke-width="1.5" opacity="0.7" fill="#ede9fe">
    <line x1="120" y1="120" x2="200" y2="160"/><line x1="200" y1="160" x2="260" y2="120"/>
    <circle cx="120" cy="120" r="3"/><circle cx="200" cy="160" r="3"/><circle cx="260" cy="120" r="3"/>
  </g>
  <rect width="800" height="450" fill="#0b0a1f" opacity="0.14"/>
</svg>
