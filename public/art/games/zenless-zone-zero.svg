<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Zenless Zone Zero — neon city">
  <defs>
    <linearGradient id="zzz-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a1430"/>
      <stop offset="0.5" stop-color="#7a2d1a"/>
      <stop offset="1" stop-color="#1a1020"/>
    </linearGradient>
    <linearGradient id="zzz-neon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f43f5e"/>
    </linearGradient>
    <filter id="zzz-glow"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#zzz-bg)"/>
  <!-- skyline -->
  <g fill="#160b1c">
    <rect x="40" y="230" width="70" height="220"/><rect x="130" y="180" width="55" height="270"/>
    <rect x="205" y="250" width="80" height="200"/><rect x="300" y="150" width="60" height="300"/>
    <rect x="380" y="210" width="70" height="240"/><rect x="470" y="120" width="64" height="330"/>
    <rect x="556" y="240" width="80" height="210"/><rect x="650" y="190" width="58" height="260"/>
    <rect x="724" y="250" width="60" height="200"/>
  </g>
  <!-- neon windows -->
  <g fill="#fbbf24" opacity="0.85">
    <rect x="312" y="170" width="8" height="8"/><rect x="330" y="190" width="8" height="8"/>
    <rect x="486" y="150" width="8" height="8"/><rect x="504" y="180" width="8" height="8"/>
    <rect x="146" y="210" width="8" height="8"/><rect x="664" y="220" width="8" height="8"/>
  </g>
  <!-- neon sign -->
  <g filter="url(#zzz-glow)">
    <rect x="120" y="120" width="220" height="10" rx="5" fill="url(#zzz-neon)"/>
    <rect x="520" y="300" width="180" height="8" rx="4" fill="#22d3ee" opacity="0.8"/>
  </g>
  <circle cx="640" cy="110" r="60" fill="url(#zzz-neon)" opacity="0.25" filter="url(#zzz-glow)"/>
  <!-- HOLLOW glitch bars -->
  <g fill="#f43f5e" opacity="0.5">
    <rect x="0" y="60" width="120" height="4"/><rect x="700" y="400" width="100" height="4"/>
  </g>
  <rect width="800" height="450" fill="#1a0d16" opacity="0.18"/>
</svg>
