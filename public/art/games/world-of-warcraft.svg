<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="World of Warcraft — epic fantasy">
  <defs>
    <linearGradient id="wow-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="0.5" stop-color="#1e40af"/>
      <stop offset="1" stop-color="#0a1228"/>
    </linearGradient>
    <radialGradient id="wow-glow" cx="0.5" cy="0.32" r="0.5">
      <stop offset="0" stop-color="#fde68a" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
    <filter id="wow-blur"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#wow-bg)"/>
  <circle cx="400" cy="150" r="160" fill="url(#wow-glow)"/>
  <!-- mountains -->
  <path d="M0 340 L160 200 L300 330 L440 180 L600 330 L740 230 L800 300 L800 450 L0 450 Z" fill="#16234a"/>
  <path d="M0 390 L140 300 L300 390 L460 310 L620 390 L760 330 L800 380 L800 450 L0 450 Z" fill="#0c1530"/>
  <!-- golden emblem -->
  <g transform="translate(400 160)" filter="url(#wow-blur)">
    <circle r="56" fill="none" stroke="#fbbf24" stroke-width="6" opacity="0.9"/>
  </g>
  <g transform="translate(400 160)" stroke="#fde68a" stroke-width="4" fill="none" opacity="0.95">
    <path d="M-30 -20 L0 26 L30 -20 M-30 -20 L0 6 L30 -20"/>
  </g>
  <!-- banners -->
  <g fill="#fbbf24" opacity="0.85">
    <path d="M150 250 l30 0 l0 70 l-15 -14 l-15 14 z"/>
    <path d="M640 250 l30 0 l0 70 l-15 -14 l-15 14 z"/>
  </g>
  <!-- sparks -->
  <g fill="#fde68a"><circle cx="220" cy="120" r="2"/><circle cx="560" cy="110" r="2.2"/><circle cx="680" cy="170" r="1.8"/><circle cx="130" cy="180" r="1.6"/></g>
  <rect width="800" height="450" fill="#070d1d" opacity="0.16"/>
</svg>
