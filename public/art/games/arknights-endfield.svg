<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Arknights Endfield — industrial sci-fi">
  <defs>
    <linearGradient id="ae-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a2a12"/>
      <stop offset="0.5" stop-color="#92400e"/>
      <stop offset="1" stop-color="#171310"/>
    </linearGradient>
    <linearGradient id="ae-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="ae-glow"><feGaussianBlur stdDeviation="3.5"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#ae-bg)"/>
  <!-- tech grid floor -->
  <g stroke="#fbbf24" stroke-width="1" opacity="0.25">
    <line x1="0" y1="360" x2="800" y2="360"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="120" y1="340" x2="40" y2="450"/><line x1="320" y1="340" x2="300" y2="450"/>
    <line x1="520" y1="340" x2="540" y2="450"/><line x1="700" y1="340" x2="760" y2="450"/>
  </g>
  <!-- hex cluster -->
  <g fill="none" stroke="url(#ae-amber)" stroke-width="3" opacity="0.85">
    <polygon points="600,90 650,118 650,174 600,202 550,174 550,118"/>
    <polygon points="690,150 724,170 724,210 690,230 656,210 656,170" opacity="0.6"/>
  </g>
  <polygon points="600,108 638,128 638,164 600,184 562,164 562,128" fill="url(#ae-amber)" opacity="0.2"/>
  <!-- industrial silhouettes -->
  <g fill="#120e0a">
    <rect x="40" y="250" width="90" height="200"/>
    <rect x="150" y="290" width="50" height="160"/>
    <rect x="650" y="270" width="110" height="180"/>
    <rect x="610" y="300" width="30" height="150"/>
    <rect x="60" y="220" width="14" height="40"/>
  </g>
  <!-- energy lines -->
  <g stroke="#fbbf24" stroke-width="2" opacity="0.7" filter="url(#ae-glow)">
    <path d="M0 200 L240 200 L280 240" fill="none"/>
    <path d="M800 160 L560 160 L520 200" fill="none"/>
  </g>
  <rect width="800" height="450" fill="#140f08" opacity="0.16"/>
</svg>
